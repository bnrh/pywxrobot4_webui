name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Run tests
        run: python -m pytest tests -q
      - name: Run frontend module smoke tests
        run: |
          node tests/js/test_overview_cards.mjs
          node tests/js/test_ai_assistant_data.mjs
          node tests/js/test_plugin_config_render.mjs
          node tests/js/test_message_labels.mjs
          node tests/js/test_message_view.mjs
          node tests/js/test_ai_assistant_ui_syntax.mjs
          node tests/js/test_app_events_modules.mjs
          node tests/js/test_dom_utils_normalize.mjs
          node tests/js/test_runtime_polling.mjs
          node tests/js/test_dom_builder.mjs
          node tests/js/test_bootstrap_lazy_load.mjs
          node tests/js/test_panel_loader.mjs

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t wxrobot-webui:ci .
