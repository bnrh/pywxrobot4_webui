<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pywxrobot4 控制台</title>
    <link rel="stylesheet" href="/static/dist/assets/style-DzLnAqi3.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar shell-card">
            <div class="brand-block">
                <p class="brand-eyebrow">pywxrobot4 / webui</p>
                <h1 class="brand-title">控制台</h1>
                <p class="brand-copy">面向消息流的插件控制台，统一观察处理状态、调度插件并维护运行环境。</p>
            </div>

            <nav class="sidebar-nav" aria-label="控制台导航">
                <button class="nav-tab is-active" type="button" data-tab="dashboard">
                    <span class="nav-tab-title">仪表盘</span>
                    <span class="nav-tab-copy">集中查看运行指标与当前状态</span>
                </button>
                <button class="nav-tab" type="button" data-tab="messages">
                    <span class="nav-tab-title">消息中心</span>
                    <span class="nav-tab-copy">查看最新进入插件服务的消息</span>
                </button>
                <button class="nav-tab" type="button" data-tab="users">
                    <span class="nav-tab-title">用户管理</span>
                    <span class="nav-tab-copy">查看心跳检测获取到的登录账号</span>
                </button>
                <button class="nav-tab" type="button" data-tab="features">
                    <span class="nav-tab-title">功能插件</span>
                    <span class="nav-tab-copy">执行一次性功能插件并管理常驻任务</span>
                </button>
                <button class="nav-tab" type="button" data-tab="ai-assistant">
                    <span class="nav-tab-title">智能插件</span>
                    <span class="nav-tab-copy">配置 AI 厂商并让模型调用 pywxrobot4 工具</span>
                </button>
                <button class="nav-tab" type="button" data-tab="plugins">
                    <span class="nav-tab-title">消息插件</span>
                    <span class="nav-tab-copy">启停依赖消息的插件并维护配置</span>
                </button>
                <button class="nav-tab" type="button" data-tab="plugin-logs">
                    <span class="nav-tab-title">插件日志</span>
                    <span class="nav-tab-copy">查看插件输出并按插件筛选日志</span>
                </button>
                <button class="nav-tab" type="button" data-tab="settings">
                    <span class="nav-tab-title">系统设置</span>
                    <span class="nav-tab-copy">维护服务参数与运行策略</span>
                </button>
                <button class="nav-tab" type="button" data-tab="logs">
                    <span class="nav-tab-title">日志中心</span>
                    <span class="nav-tab-copy">查看最新日志与当前活动文件</span>
                </button>
            </nav>
        </aside>

        <main class="workspace">
            <header class="workspace-header shell-card">
                <div>
                    <p class="workspace-eyebrow" id="activeTabLabel">仪表盘</p>
                    <h2 class="workspace-title" id="pageTitle">运行概览</h2>
                    <p class="workspace-copy" id="pageDescription">集中查看插件服务状态、消息积压和待处理变更。</p>
                </div>
                <div class="workspace-actions">
                    <button class="button ghost" id="tabRefreshButton" type="button">刷新当前视图</button>
                    <button class="button primary" id="reloadConfigButton" type="button">重载运行配置</button>
                    <div class="status-pill" id="statusPill">等待初始化</div>
                </div>
            </header>

            <section class="panel-group" id="panelGroup"></section>
        </main>
    </div>

    <div id="modalRoot"></div>

    <script type="module" src="/static/dist/assets/app.entry-DzgfOcS7.js"></script>
</body>
</html>
